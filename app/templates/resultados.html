<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <title>Resultados da Análise</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <style>
    .prediction-card {
      transition: transform 0.2s;
    }

    .prediction-card:hover {
      transform: translateY(-5px);
    }

    .winner-badge {
      font-size: 1.4rem;
      font-weight: bold;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 20px;
      color: white;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .bg-winner-rf {
      background: linear-gradient(45deg, #0d6efd, #0a58ca);
    }

    .bg-winner-bert {
      background: linear-gradient(45deg, #dc3545, #b02a37);
    }
  </style>
</head>

<body class="bg-light">
  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>📊 Resultados da Classificação</h2>
      <a href="/" class="btn btn-outline-secondary">⬅ Nova Análise</a>
    </div>

    <div class="accordion mb-5" id="accordionTexto">
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
            data-bs-target="#collapseTexto">📄 Ver Texto Analisado ({{ texto_original|length }} caracteres)</button>
        </h2>
        <div id="collapseTexto" class="accordion-collapse collapse">
          <div class="accordion-body text-muted" style="max-height: 200px; overflow-y: auto;">{{ texto_original }}</div>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-md-6">
        <div class="card h-100 shadow-sm prediction-card border-0">
          <div class="card-header bg-transparent border-0 pt-4 pb-0">
            <h5 class="text-primary fw-bold">
              🤖 Random Forest
              <span class="badge bg-light text-dark border ms-2 fw-normal" style="font-size: 0.8rem;">⏱ {{ tempo_rf
                }}s</span>
            </h5>
          </div>
          <div class="card-body">
            <div id="rf-winner" class="winner-badge bg-winner-rf">Calculando...</div>

            <div style="height: 300px;">
              <canvas id="chartRF"></canvas>
            </div>

            <hr class="my-4" />

            <form action="/analise_lime" method="post" target="_blank" class="d-grid">
              <input type="hidden" name="texto" value="{{ texto_original }}" />
              <input type="hidden" name="modelo_escolhido" value="rf" />
              <button type="submit" class="btn btn-primary">🔍 Explicar com LIME (RF)
                <br /><small style="font-size: 0.7em;">(Execução lenta...)</small>
              </button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card h-100 shadow-sm prediction-card border-0">
          <div class="card-header bg-transparent border-0 pt-4 pb-0">
            <h5 class="text-danger fw-bold">
              🧠 Deep Learning (BERT)
              <span class="badge bg-light text-dark border ms-2 fw-normal" style="font-size: 0.8rem;">⏱ {{ tempo_bert
                }}s</span>
            </h5>
          </div>
          <div class="card-body">
            <div id="bert-winner" class="winner-badge bg-winner-bert">Calculando...</div>

            <div style="height: 300px;">
              <canvas id="chartBERT"></canvas>
            </div>

            <hr class="my-4" />

            <form action="/analise_lime" method="post" target="_blank" class="d-grid">
              <input type="hidden" name="texto" value="{{ texto_original }}" />
              <input type="hidden" name="modelo_escolhido" value="bert" />
              <button type="submit" class="btn btn-outline-danger">
                🔍 Explicar com LIME (BERT)
                <br /><small style="font-size: 0.7em;">(Execução lenta...)</small>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 1. Registrar o Plugin de DataLabels
    Chart.register(ChartDataLabels);

    const dadosRF = {{ res_rf | tojson }};
    const dadosBERT = {{ res_bert | tojson }};

    function getWinner(dados) {
      let maxProb = -1;
      let winnerClass = "";

      for (const [classe, prob] of Object.entries(dados)) {
        // Garante que prob seja tratado como número
        let valorNumerico = parseFloat(prob);

        if (valorNumerico > maxProb) {
          maxProb = valorNumerico;
          winnerClass = classe;
        }
      }

      // AQUI ESTÁ A CORREÇÃO: .toFixed(2) força 2 casas decimais
      return `${winnerClass} (${maxProb.toFixed(2)}%)`;
    }

    // Atualiza os badges
    document.getElementById('rf-winner').innerText = getWinner(dadosRF);
    document.getElementById('bert-winner').innerText = getWinner(dadosBERT);

    // Configuração Comum com DataLabels
    const chartOptions = {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      layout: {
        padding: { right: 50 }
      },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
        datalabels: {
          color: '#444',
          anchor: 'end',
          align: 'end',
          formatter: function (value) {
            // Aqui também garantimos 2 casas no gráfico, se quiser
            return parseFloat(value).toFixed(2) + '%';
          },
          font: {
            weight: 'bold',
            size: 12
          }
        }
      },
      scales: {
        x: {
          beginAtZero: true,
          max: 100,
          grid: { display: false }
        },
        y: {
          grid: { display: false }
        }
      }
    };

    // Gráfico RF
    new Chart(document.getElementById('chartRF'), {
      type: 'bar',
      data: {
        labels: Object.keys(dadosRF),
        datasets: [{
          data: Object.values(dadosRF),
          backgroundColor: 'rgba(13, 110, 253, 0.7)',
          borderColor: 'rgba(13, 110, 253, 1)',
          borderWidth: 1,
          barPercentage: 0.6
        }]
      },
      options: chartOptions
    });

    // Gráfico BERT
    new Chart(document.getElementById('chartBERT'), {
      type: 'bar',
      data: {
        labels: Object.keys(dadosBERT),
        datasets: [{
          data: Object.values(dadosBERT),
          backgroundColor: 'rgba(220, 53, 69, 0.7)',
          borderColor: 'rgba(220, 53, 69, 1)',
          borderWidth: 1,
          barPercentage: 0.6
        }]
      },
      options: chartOptions
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
