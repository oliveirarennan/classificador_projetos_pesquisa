<!DOCTYPE html>
<html>

<head>
    <title>Classificador de Projetos - Mestrado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3>Classificador Automático de Projetos de Pesquisa</h3>
            </div>
            <div class="card-body">

                <div class="row mb-4 p-3 bg-secondary bg-opacity-10 rounded">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">📂 Opção A: Carregar arquivo .txt</label>
                        <input class="form-control" type="file" id="inputArquivoTxt" accept=".txt">
                        <div class="form-text">O conteúdo será colado automaticamente abaixo.</div>
                    </div>

                </div>

                <form action="/classificar" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Texto do Projeto para Análise:</label>
                        <textarea class="form-control" id="caixaTexto" name="texto_projeto" rows="10" required
                            placeholder="Cole o texto aqui ou use as opções acima..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100 btn-lg">🚀 Classificar Projeto</button>
                </form>
            </div>

            <script>
                // 1. Lógica para o Upload de TXT
                document.getElementById('inputArquivoTxt').addEventListener('change', function (event) {
                    const arquivo = event.target.files[0];
                    if (arquivo) {
                        const leitor = new FileReader();
                        leitor.onload = function (e) {
                            // Joga o conteúdo do arquivo na caixa de texto
                            document.getElementById('caixaTexto').value = e.target.result;
                        };
                        leitor.readAsText(arquivo);
                    }
                });

            </script>
        </div>
    </div>
</body>

</html>
